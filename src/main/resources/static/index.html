<!DOCTYPE html>
<html>
<head>
    <title>Slot Booking App</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Slot Booking App</h1>

<form id="bookForm">

<form id="bookForm">

    <div>
        <label>Select Date:</label>
        <input type="date" id="date" required>
    </div>

    <div>
        <label>Select Time Slot:</label>
        <input type="time" id="timeSlot" required>
    </div>

    <div id="gameSelection" style="display: none;">
        <label>Select Game:</label>
        <select id="gameSelect" name="gameSelect">
            <option value="">Select a game</option>
        </select>
    </div>

    <button type="submit" id="actionButton">Check Available Games</button>

</form>

</form>

<h2>Bookings</h2>

<div id="bookingsContainer"></div>

<script src="script.js"></script>

</body>
</html>
