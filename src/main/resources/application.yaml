server:
  port: 8081

spring:
  application:
    name: slot_book


  datasource:
    url: jdbc:mysql://localhost:3306/slotbook
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql:  true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect